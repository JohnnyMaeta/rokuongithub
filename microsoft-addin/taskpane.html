<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>録音くん</title>

  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="https://alcdn.msauth.net/browser/2.38.4/js/msal-browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
      margin: 0;
      padding: 12px;
      background: #faf9f8;
      color: #323130;
      font-size: 14px;
    }
    h1 { font-size: 18px; margin: 0 0 12px; color: #0078d4; }
    .section { background: #fff; padding: 12px; border-radius: 4px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
    .input-group { margin-bottom: 10px; }
    .input-group label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 13px; }
    .input-group input[type="text"] {
      width: 100%; padding: 6px 8px; border: 1px solid #c8c6c4; border-radius: 2px; font-size: 14px;
    }
    button {
      background: #0078d4; color: #fff; border: none; padding: 8px 16px;
      font-size: 14px; cursor: pointer; border-radius: 2px; margin: 4px 4px 4px 0;
    }
    button:hover:not(:disabled) { background: #106ebe; }
    button:disabled { background: #c8c6c4; cursor: not-allowed; color: #fff; }
    button.secondary { background: #fff; color: #323130; border: 1px solid #8a8886; }
    button.secondary:hover:not(:disabled) { background: #f3f2f1; }
    #status { padding: 8px; background: #f3f2f1; border-radius: 2px; font-size: 13px; min-height: 18px; margin-top: 8px; }
    #status.error { background: #fde7e9; color: #a4262c; }
    #status.success { background: #dff6dd; color: #107c10; }
    #audioPlayback { width: 100%; margin-top: 8px; }
    .user-info { font-size: 12px; color: #605e5c; }
    .user-info a { color: #0078d4; cursor: pointer; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <h1>録音くん</h1>

  <div class="section" id="signinSection">
    <div id="signedOutView">
      <p style="margin: 0 0 8px;">Microsoftアカウントでサインインして、録音をOneDriveに保存します。</p>
      <button id="signinButton">サインイン</button>
    </div>
    <div id="signedInView" class="hidden">
      <div class="user-info">
        <span id="userName"></span> <a id="signoutLink">（サインアウト）</a>
      </div>
    </div>
  </div>

  <div class="section hidden" id="recorderSection">
    <div class="input-group">
      <label for="prefixName">グループ名/ペア名（ファイル名の先頭に付きます）</label>
      <input type="text" id="prefixName" placeholder="例: TeamA、John_Jane">
    </div>

    <button id="recordButton">録音開始</button>
    <button id="stopButton" class="secondary" disabled>停止</button>
    <button id="saveButton" disabled>OneDriveに保存</button>

    <div id="status">サインインが完了したら、グループ名を入れて「録音開始」を押してください。</div>
    <audio id="audioPlayback" controls class="hidden"></audio>
  </div>

  <script>
    // ====== 設定 ======
    const CLIENT_ID = "77b68047-e821-4d3d-861f-d410989b418a";
    const PARENT_FOLDER_NAME = "録音くん保存フォルダ";
    const SUBFOLDER_SHEET_NAME = "シート1";
    const SUBFOLDER_CELL = "B1";
    const HISTORY_SHEET_NAME = "履歴";
    const HISTORY_HEADERS = ["ファイル名", "保存日時", "フォルダパス", "ファイルリンク"];
    const SCOPES = ["Files.ReadWrite", "User.Read"];

    // ====== 状態 ======
    let msalInstance = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let originalAudioBlob = null;
    let stream = null;

    // ====== UI 要素 ======
    const $ = (id) => document.getElementById(id);
    const els = {
      signinButton: $("signinButton"),
      signoutLink: $("signoutLink"),
      signedOutView: $("signedOutView"),
      signedInView: $("signedInView"),
      userName: $("userName"),
      recorderSection: $("recorderSection"),
      prefixName: $("prefixName"),
      recordButton: $("recordButton"),
      stopButton: $("stopButton"),
      saveButton: $("saveButton"),
      status: $("status"),
      audioPlayback: $("audioPlayback"),
    };

    function setStatus(msg, kind) {
      els.status.textContent = msg;
      els.status.className = kind || "";
    }

    // ====== Office 起動 ======
    Office.onReady(() => {
      initMsal();
      bindEvents();
    });

    // ====== MSAL ======
    function initMsal() {
      msalInstance = new msal.PublicClientApplication({
        auth: {
          clientId: CLIENT_ID,
          authority: "https://login.microsoftonline.com/common",
          redirectUri: window.location.origin + window.location.pathname,
        },
        cache: { cacheLocation: "sessionStorage" },
      });

      msalInstance.handleRedirectPromise().then(() => {
        const accounts = msalInstance.getAllAccounts();
        if (accounts.length > 0) {
          showSignedIn(accounts[0]);
        }
      }).catch((e) => {
        console.error(e);
      });
    }

    function showSignedIn(account) {
      els.userName.textContent = account.username || account.name || "サインイン済み";
      els.signedOutView.classList.add("hidden");
      els.signedInView.classList.remove("hidden");
      els.recorderSection.classList.remove("hidden");
    }

    function showSignedOut() {
      els.signedOutView.classList.remove("hidden");
      els.signedInView.classList.add("hidden");
      els.recorderSection.classList.add("hidden");
    }

    async function signIn() {
      try {
        const result = await msalInstance.loginPopup({ scopes: SCOPES });
        showSignedIn(result.account);
      } catch (e) {
        console.error(e);
        setStatus("サインイン失敗: " + e.message, "error");
      }
    }

    function signOut() {
      const account = msalInstance.getAllAccounts()[0];
      if (account) {
        msalInstance.logoutPopup({ account }).catch(console.error);
      }
      showSignedOut();
    }

    async function getAccessToken() {
      const account = msalInstance.getAllAccounts()[0];
      if (!account) throw new Error("サインインしていません");
      try {
        const r = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account });
        return r.accessToken;
      } catch (e) {
        if (e instanceof msal.InteractionRequiredAuthError) {
          const r = await msalInstance.acquireTokenPopup({ scopes: SCOPES });
          return r.accessToken;
        }
        throw e;
      }
    }

    // ====== Microsoft Graph ======
    async function graphGet(token, url) {
      const r = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
      return r;
    }

    async function ensureFolder(token, folderName, parentItemId) {
      // 親アイテムIDが指定されない場合はルート直下
      const childrenUrl = parentItemId
        ? `https://graph.microsoft.com/v1.0/me/drive/items/${parentItemId}/children`
        : `https://graph.microsoft.com/v1.0/me/drive/root/children`;

      // 既存チェック: children を取得して name 一致するものを探す
      const listRes = await graphGet(token, `${childrenUrl}?$select=id,name,webUrl,folder&$top=200`);
      if (listRes.ok) {
        const data = await listRes.json();
        const found = (data.value || []).find(
          (x) => x.folder && x.name === folderName
        );
        if (found) return found;
      }

      // 作成
      const createRes = await fetch(childrenUrl, {
        method: "POST",
        headers: {
          Authorization: `Bearer ${token}`,
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          name: folderName,
          folder: {},
          "@microsoft.graph.conflictBehavior": "fail",
        }),
      });
      if (!createRes.ok) {
        const txt = await createRes.text();
        throw new Error(`フォルダ作成失敗 (${createRes.status}): ${txt}`);
      }
      return await createRes.json();
    }

    async function uploadFile(token, parentItemId, fileName, blob) {
      const url = `https://graph.microsoft.com/v1.0/me/drive/items/${parentItemId}:/${encodeURIComponent(fileName)}:/content`;
      const r = await fetch(url, {
        method: "PUT",
        headers: {
          Authorization: `Bearer ${token}`,
          "Content-Type": "audio/mpeg",
        },
        body: blob,
      });
      if (!r.ok) {
        const txt = await r.text();
        throw new Error(`アップロード失敗 (${r.status}): ${txt}`);
      }
      return await r.json();
    }

    // ====== Excel 連携 ======
    async function getSubFolderNameFromSheet() {
      try {
        return await Excel.run(async (context) => {
          let sheet = context.workbook.worksheets.getItemOrNullObject(SUBFOLDER_SHEET_NAME);
          await context.sync();
          if (sheet.isNullObject) {
            sheet = context.workbook.worksheets.getFirst();
          }
          const range = sheet.getRange(SUBFOLDER_CELL);
          range.load("values");
          await context.sync();
          const v = range.values && range.values[0] && range.values[0][0];
          if (v === null || v === undefined || v === "") return null;
          return String(v).trim().replace(/[\\\/:*?"<>|]/g, "_") || null;
        });
      } catch (e) {
        console.warn("サブフォルダ名取得失敗:", e);
        return null;
      }
    }

    async function addRecordToHistorySheet(fileName, folderPathText, folderUrl, fileUrl) {
      await Excel.run(async (context) => {
        let sheet = context.workbook.worksheets.getItemOrNullObject(HISTORY_SHEET_NAME);
        await context.sync();
        if (sheet.isNullObject) {
          sheet = context.workbook.worksheets.add(HISTORY_SHEET_NAME);
          const headerRange = sheet.getRangeByIndexes(0, 0, 1, HISTORY_HEADERS.length);
          headerRange.values = [HISTORY_HEADERS];
          headerRange.format.font.bold = true;
        }
        const used = sheet.getUsedRangeOrNullObject();
        used.load(["rowCount"]);
        await context.sync();
        const newRowIndex = used.isNullObject ? 0 : used.rowCount;

        const ts = new Date();
        const formattedTimestamp = ts.toLocaleString("ja-JP", {
          timeZone: "Asia/Tokyo",
          year: "numeric", month: "2-digit", day: "2-digit",
          hour: "2-digit", minute: "2-digit", second: "2-digit",
        });

        const newRow = sheet.getRangeByIndexes(newRowIndex, 0, 1, 4);
        newRow.values = [[
          fileName,
          formattedTimestamp,
          `=HYPERLINK("${folderUrl}","${folderPathText}")`,
          `=HYPERLINK("${fileUrl}","${fileName}")`,
        ]];
        await context.sync();
      });
    }

    // ====== 録音 + MP3 エンコード ======
    async function startRecording() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const options = { mimeType: "audio/webm;codecs=opus" };
        if (!MediaRecorder.isTypeSupported(options.mimeType)) {
          delete options.mimeType;
        }
        mediaRecorder = new MediaRecorder(stream, options);
        mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
          originalAudioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
          const url = URL.createObjectURL(originalAudioBlob);
          els.audioPlayback.src = url;
          els.audioPlayback.classList.remove("hidden");

          els.recordButton.disabled = false;
          els.stopButton.disabled = true;
          els.saveButton.disabled = false;
          els.prefixName.disabled = false;
          setStatus("録音停止。再生またはOneDriveに保存できます。");
          audioChunks = [];
        };

        audioChunks = [];
        mediaRecorder.start();
        setStatus("録音中...");
        els.recordButton.disabled = true;
        els.stopButton.disabled = false;
        els.saveButton.disabled = true;
        els.prefixName.disabled = true;
        els.audioPlayback.classList.add("hidden");
        els.audioPlayback.src = "";
      } catch (err) {
        console.error("マイクアクセスエラー:", err);
        setStatus("マイクにアクセスできませんでした。ブラウザのマイク許可を確認してください。", "error");
      }
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
      }
      if (stream) {
        stream.getTracks().forEach((t) => t.stop());
        stream = null;
      }
    }

    async function encodeToMp3(audioBlob) {
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const arrayBuffer = await audioBlob.arrayBuffer();
      const audioBuffer = await audioContext.decodeAudioData(arrayBuffer).catch((e) => {
        throw new Error("音声デコード失敗: " + e.message);
      });
      const numChannels = audioBuffer.numberOfChannels;
      const sampleRate = audioBuffer.sampleRate;
      const kbps = 128;
      const enc = new lamejs.Mp3Encoder(numChannels, sampleRate, kbps);
      const mp3Data = [];
      const pcm = [];
      for (let i = 0; i < numChannels; i++) pcm.push(audioBuffer.getChannelData(i));
      const left = new Int16Array(pcm[0].length);
      for (let i = 0; i < pcm[0].length; i++) left[i] = Math.max(-1, Math.min(1, pcm[0][i])) * 32767;
      let right = null;
      if (numChannels > 1) {
        right = new Int16Array(pcm[1].length);
        for (let i = 0; i < pcm[1].length; i++) right[i] = Math.max(-1, Math.min(1, pcm[1][i])) * 32767;
      }
      const block = 1152;
      let buf;
      for (let i = 0; i < left.length; i += block) {
        const l = left.subarray(i, i + block);
        const r = right ? right.subarray(i, i + block) : null;
        buf = numChannels === 1 ? enc.encodeBuffer(l) : enc.encodeBuffer(l, r);
        if (buf.length > 0) mp3Data.push(buf);
      }
      buf = enc.flush();
      if (buf.length > 0) mp3Data.push(buf);
      return new Blob(mp3Data, { type: "audio/mpeg" });
    }

    // ====== 保存フロー（録音→MP3→OneDrive→履歴）======
    async function saveToCloud() {
      if (!originalAudioBlob) {
        setStatus("保存する録音データがありません。", "error");
        return;
      }

      els.saveButton.disabled = true;
      els.recordButton.disabled = true;
      els.prefixName.disabled = true;

      try {
        setStatus("MP3にエンコード中...");
        const mp3Blob = await encodeToMp3(originalAudioBlob);

        setStatus("OneDriveに接続中...");
        const token = await getAccessToken();

        setStatus("Excel から設定を読み取り中...");
        const subFolderName = await getSubFolderNameFromSheet();

        setStatus("OneDrive にフォルダを準備中...");
        const parent = await ensureFolder(token, PARENT_FOLDER_NAME, null);
        let target, folderPathText;
        if (subFolderName) {
          target = await ensureFolder(token, subFolderName, parent.id);
          folderPathText = `${PARENT_FOLDER_NAME} > ${subFolderName}`;
        } else {
          target = parent;
          folderPathText = PARENT_FOLDER_NAME;
        }

        let userPrefix = (els.prefixName.value || "").trim() || "unknown";
        userPrefix = userPrefix.replace(/[\s\\\/:*?"<>|]/g, "_");
        const ts = new Date().toISOString().replace(/[:.]/g, "-");
        const finalFileName = `${userPrefix}_recording-${ts}.mp3`;

        setStatus("OneDriveにアップロード中...");
        const uploaded = await uploadFile(token, target.id, finalFileName, mp3Blob);

        setStatus("Excel の履歴シートに記録中...");
        await addRecordToHistorySheet(finalFileName, folderPathText, target.webUrl, uploaded.webUrl);

        setStatus(`保存完了: ${folderPathText} に ${finalFileName} を保存しました。`, "success");
      } catch (e) {
        console.error(e);
        setStatus("保存失敗: " + e.message, "error");
        els.saveButton.disabled = false;
      } finally {
        els.recordButton.disabled = false;
        els.prefixName.disabled = false;
      }
    }

    // ====== イベントバインド ======
    function bindEvents() {
      els.signinButton.onclick = signIn;
      els.signoutLink.onclick = signOut;
      els.recordButton.onclick = startRecording;
      els.stopButton.onclick = stopRecording;
      els.saveButton.onclick = saveToCloud;
    }
  </script>
</body>
</html>
